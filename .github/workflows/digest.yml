name: news-digest

on:
  schedule:
    - cron: "0,5,10,15 23 * * 0-4"
    - cron: "30,35,40,45 4 * * 1-5"
    - cron: "30,35,40,45 8 * * 1-5"
    - cron: "0,5,10,15 13 * * 1-5"
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: news-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run digest
        env:
          TELEGRAM_TOKEN:           ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_MASTER:  ${{ secrets.TELEGRAM_CHAT_ID_MASTER }}
          TELEGRAM_CHAT_ID_NORMAL:  ${{ secrets.TELEGRAM_CHAT_ID_NORMAL }}
          TELEGRAM_CHAT_ID_SUB:     ${{ secrets.TELEGRAM_CHAT_ID_SUB }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID:          ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:      ${{ secrets.NAVER_CLIENT_SECRET }}
          SECRET_CONFIG:            ${{ secrets.SECRET_CONFIG }}
          FORCE_DIGEST: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: python main.py

      - name: Save seen state
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add seen.json
          git commit -m "update state [skip ci]" || echo "변경 없음"
          git pull --rebase --autostash origin main || true
          git push || true
